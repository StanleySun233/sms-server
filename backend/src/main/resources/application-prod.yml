spring:
  # Database configuration (Docker service names)
  datasource:
    url: jdbc:mysql://mysql:3306/sms_server?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: ${DB_USER:smsadmin}
    password: ${DB_PASSWORD:smspassword}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 10
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  # Redis configuration (Docker service name)
  data:
    redis:
      host: redis
      port: 6379
      password: ${REDIS_PASSWORD:}
      database: 0
      timeout: 6000ms
      lettuce:
        pool:
          max-active: 16
          max-idle: 8
          min-idle: 4
          max-wait: -1ms

  kafka:
    bootstrap-servers: kafka:9092

# MyBatis-Plus configuration
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  mapper-locations: classpath*:/mapper/**/*.xml

# Logging for production
logging:
  level:
    root: INFO
    com.smsserver: INFO
    com.smsserver.mapper: WARN
    org.springframework.security: WARN
  file:
    name: /app/logs/sms-server.log
    max-size: 100MB
    max-history: 30
